<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Business 3D</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card" id="loginCard">
    <div class="login-brand">
      <div class="login-icon"><i class="fas fa-layer-group"></i></div>
      <h1>Business 3D</h1>
      <p>Enter your 4-digit PIN to continue</p>
    </div>

    <div class="pin-dots">
      <span class="pin-dot" id="d0"></span>
      <span class="pin-dot" id="d1"></span>
      <span class="pin-dot" id="d2"></span>
      <span class="pin-dot" id="d3"></span>
    </div>

    <input id="pinInput" class="pin-input" type="tel" inputmode="numeric"
           maxlength="4" autocomplete="off" spellcheck="false"
           oninput="pinOnInput(this)" onkeydown="pinOnKeyDown(event)"
           autofocus>

    <div class="pin-error" id="pin-error">
      <i class="fas fa-exclamation-circle"></i> Incorrect PIN. Try again.
    </div>

    <div class="pin-pad">
      <button type="button" class="pin-btn" data-digit="1">1</button>
      <button type="button" class="pin-btn" data-digit="2">2</button>
      <button type="button" class="pin-btn" data-digit="3">3</button>
      <button type="button" class="pin-btn" data-digit="4">4</button>
      <button type="button" class="pin-btn" data-digit="5">5</button>
      <button type="button" class="pin-btn" data-digit="6">6</button>
      <button type="button" class="pin-btn" data-digit="7">7</button>
      <button type="button" class="pin-btn" data-digit="8">8</button>
      <button type="button" class="pin-btn" data-digit="9">9</button>
      <button type="button" class="pin-btn pin-back" id="pinBack"><i class="fas fa-backspace"></i></button>
      <button type="button" class="pin-btn" data-digit="0">0</button>
      <button type="button" class="pin-btn pin-enter" id="pinEnter"><i class="fas fa-arrow-right"></i></button>
    </div>
  </div>
</div>

<script>
// Unregister any stale service workers from the old root scope
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs =>
    regs.forEach(reg => { if (!reg.scope.endsWith('/crm/')) reg.unregister(); })
  );
}

// ── Synchronous state & handlers (must be available before any await) ──

let pin = '';

function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('filled', i < pin.length));
}

function hideError() {
  document.getElementById('pin-error').style.display = 'none';
}

function shakeCard() {
  const card = document.getElementById('loginCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 500);
}

async function submitPin() {
  const field = document.getElementById('pinInput');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });
    if (!res.ok) throw new Error('bad_pin');
    const data = await res.json();
    localStorage.setItem('crm_token', data.token);
    location.replace('/home');
  } catch (_) {
    pin = '';
    field.value = '';
    updateDots();
    document.getElementById('pin-error').style.display = 'flex';
    shakeCard();
    setTimeout(() => field.focus(), 50);
  }
}

// Inline handler targets (called from oninput / onkeydown attributes)
window.pinOnInput = function (field) {
  const digits = field.value.replace(/\D/g, '').slice(0, 4);
  field.value = digits;
  pin = digits;
  updateDots();
  hideError();
  if (pin.length === 4) submitPin();
};

window.pinOnKeyDown = function (e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (pin.length === 4) submitPin(); else shakeCard();
  }
};

// ── Wire up buttons after DOM is ready ──

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.pin-btn[data-digit]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (pin.length >= 4) return;
      pin += btn.dataset.digit;
      const f = document.getElementById('pinInput');
      f.value = pin;
      updateDots();
      hideError();
      f.focus();
      if (pin.length === 4) submitPin();
    });
  });

  document.getElementById('pinBack').addEventListener('click', () => {
    pin = pin.slice(0, -1);
    const f = document.getElementById('pinInput');
    f.value = pin;
    updateDots();
    hideError();
    f.focus();
  });

  document.getElementById('pinEnter').addEventListener('click', () => {
    if (pin.length === 4) submitPin(); else shakeCard();
    document.getElementById('pinInput').focus();
  });

  document.getElementById('pinInput').focus();

  // ── Async: redirect if already authenticated ──
  (async () => {
    const stored = localStorage.getItem('crm_token');
    if (!stored) return;
    try {
      const r = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${stored}` } });
      if (r.ok) { location.replace('/home'); return; }
    } catch (_) {}
    localStorage.removeItem('crm_token');
  })();
});
</script>
</body>
</html>
